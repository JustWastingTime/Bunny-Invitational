<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, height=1080" />
  <title>Bunny Invitational Overlay</title>
  <link rel="stylesheet" href="/overlay/styles.css" />
  <link rel="stylesheet" href="/overlay/transition.css" />
  <link rel="stylesheet" href="/overlay/starting-soon.css" />
</head>
<body>
  <div id="scene-transition" class="scene-transition" aria-hidden="true">
    <div class="scene-transition-stage"></div>
  </div>

  <div id="starting-soon" class="starting-soon" aria-hidden="true">
    <div class="ss-bg" aria-hidden="true">
      <div class="ss-glow ss-glow-a"></div>
      <div class="ss-glow ss-glow-b"></div>
      <div class="ss-glow ss-glow-c"></div>
      <div class="ss-track-lines"></div>
      <div class="ss-sparkles">
        <span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span>
      </div>
    </div>
    <div class="ss-frame">
      <div class="ss-ears" aria-hidden="true">
        <span class="ss-ear ss-ear-l"></span>
        <span class="ss-ear ss-ear-r"></span>
      </div>
      <p class="ss-kicker">Bunny Invitational</p>
      <h1 class="ss-title">
        <span class="ss-title-main">Starting Soon</span>
      </h1>
      <p class="ss-sub">Gates opening · Please stand by</p>
      <div class="ss-gates" aria-hidden="true">
        <span class="ss-gate g1">1</span>
        <span class="ss-gate g2">2</span>
        <span class="ss-gate g3">3</span>
        <span class="ss-gate g4">4</span>
        <span class="ss-gate g5">5</span>
        <span class="ss-gate g6">6</span>
        <span class="ss-gate g7">7</span>
        <span class="ss-gate g8">8</span>
        <span class="ss-gate g9">9</span>
      </div>
      <div class="ss-pulse-bar" aria-hidden="true"><i></i></div>
    </div>
  </div>

  <div id="overlay" class="overlay hidden">
  <header class="top-bar">
    <div class="meta-block">
      <div id="day-label" class="meta-line meta-large">Day 1</div>
      <div id="match-label" class="meta-line meta-large">Match 1</div>
      <div id="category-label" class="meta-line meta-large">Long</div>
      <div id="round-label" class="meta-line meta-small">Qualification Round</div>
    </div>
  </header>

  <footer id="teams-panel" class="teams-panel">
    <!-- populated by JS -->
  </footer>
  </div>

  <script src="/overlay/overlay.js" type="module"></script>
</body>
</html>
